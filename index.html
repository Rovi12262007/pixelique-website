<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*** Welcome to Pixelique Café ***</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=VT323&display=swap" rel="stylesheet">
    <style>
        /* 2000s Scrollbar */
        html {
            scrollbar-face-color: #ffb3db;
            scrollbar-arrow-color: #ffffff;
            scrollbar-track-color: #ffe6f2;
        }

        body {
            background-image: url('background.jpg');
            background-size: cover;            
            background-attachment: fixed;      
            background-repeat: no-repeat;      
            background-position: center;       
            background-color: #ffe6f2;
            font-family: 'VT323', monospace;
            font-size: 20px; 
            color: #000080; 
            margin: 0;
            padding: 0;
            cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym49.cur'), auto;
            line-height: 1.4;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: 20px auto;
            background-color: #ffffff;
            border: 4px outset #ff99d0;
            padding: 15px;
            overflow: hidden; 
        }

        header {
            text-align: center;
        }

        .logo {
            display: block; 
            text-align: center;
            margin: -15px -15px 15px -15px; 
            border-bottom: 4px outset #ff99d0;
            background-image: url('background banner.jpg'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
            line-height: 0; 
        }

        .main-logo-image {
            width: 100%;      
            max-width: none;  
            height: auto;     
            display: block;
            mix-blend-mode: multiply; 
        }

        .marquee-container {
            background: #ffb3db;
            color: #fff;
            padding: 5px;
            font-size: 18px;
            border: 2px inset #ffffff;
            margin: 10px 0;
        }

        nav {
            background: linear-gradient(to bottom, #fff6f9, #ffd9e8); 
            border: 2px solid #ffb3db;
            padding: 15px 10px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { display: inline-block; margin: 5px 10px; }
        
        nav a {
            text-decoration: none;
            font-family: 'VT323', monospace;
            font-size: 24px;
            padding: 8px 25px;
            border-radius: 50px; 
            display: inline-block;
            background: white;
            background: linear-gradient(to bottom, #ffffff 0%, #f2f2f2 100%); 
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.8), 0 3px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        nav a:hover { transform: scale(1.05); filter: brightness(1.1); }

        .nav-home { border: 4px solid #ff4da6; color: #ff4da6; }
        .nav-about { border: 4px solid #a64dff; color: #a64dff; }
        .nav-services { border: 4px solid #7cdb4f; color: #7cdb4f; }
        .nav-contact { border: 4px solid #ffcc00; color: #ffcc00; }

        .banner {
            border: 5px double #ff99d0;
            margin: 20px 0;
            padding: 20px;
            text-align: center;
            background: #fff0f5;
        }

        .cta-button {
            display: inline-block;
            background: #ffb3db; /* Changed to Pink */
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #666666;
            border-bottom: 2px solid #666666;
            padding: 10px 25px;
            color: #000;
            text-decoration: none;
            font-size: 20px;
        }

        h2 {
            background-color: #ffb3db;
            color: white;
            padding: 10px;
            font-size: 32px; 
            border-left: 10px solid #ff00ff;
            margin-top: 0;

            text-align: center;
        }

        .intro-box {
            border: 2px dotted #ff00ff;
            padding: 15px;
            background-color: #fff9fc;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .split-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            margin-top: 30px;
        }

        .left-side { flex: 0 0 340px; }
        .right-side { flex: 1; }

        .zones-container {

            flex-direction: column;

            margin-bottom: 30px;
        }

            background: #ffffff;
            text-align: center;
            width: 320px;       
            height: 320px;      
            display: flex;

            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 4px 4px 0px #ff99d0;
        }

            margin-bottom: 15px;

        }

            padding: 20px;

            width: 100%; 
            box-sizing: border-box;
            font-size: 24px; 
        }
